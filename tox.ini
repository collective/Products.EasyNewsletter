[tox]
min_version = 4.11.0
envlist =
    py{310,311,312}
    lint
    coverage-report
skip_missing_interpreters = True

[testenv]
skip_install = true
allowlist_externals =
    uv
commands =
    uv sync --extra dev
    uv run pytest -v {posargs}

[testenv:lint]
skip_install = true
basepython = python3.12
allowlist_externals =
    uv
commands =
    uv sync --extra dev
    uv run ruff check .
    uv run ruff format --check .

[testenv:coverage-report]
skip_install = true
basepython = python3.12
allowlist_externals =
    uv
commands =
    uv sync --extra dev
    uv run pytest --cov=Products.EasyNewsletter --cov-report=html --cov-report=xml --cov-report=term -v {posargs}
